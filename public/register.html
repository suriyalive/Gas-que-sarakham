<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>สมัครสมาชิก — สถานะน้ำมัน จ.เชียงราย</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .card { background: #1e293b; border-radius: 16px; padding: 32px; width: 100%; max-width: 400px; margin: 20px; }
        .card h1 { font-size: 1.3rem; color: #f59e0b; margin-bottom: 4px; }
        .card p { font-size: 0.8rem; color: #64748b; margin-bottom: 20px; }
        label { display: block; font-size: 0.8rem; color: #94a3b8; margin: 12px 0 4px; }
        input { width: 100%; padding: 10px 12px; border-radius: 8px; border: 1px solid #475569; background: #0f172a; color: #e2e8f0; font-size: 0.9rem; }
        input:focus { outline: none; border-color: #f59e0b; }
        .btn { width: 100%; padding: 12px; border-radius: 8px; border: none; font-size: 0.9rem; font-weight: 600; cursor: pointer; margin-top: 16px; }
        .btn-submit { background: #f59e0b; color: #0f172a; }
        .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-back { background: #334155; color: #94a3b8; margin-top: 8px; }
        .msg { margin-top: 12px; padding: 10px; border-radius: 8px; font-size: 0.8rem; display: none; }
        .msg.error { display: block; background: #ef444420; color: #ef4444; }
        .msg.success { display: block; background: #22c55e20; color: #22c55e; }
    </style>
</head>
<body>
    <div class="card">
        <h1>⛽ สมัครสมาชิก</h1>
        <p>สถานะน้ำมัน จ.เชียงราย — สำหรับเจ้าหน้าที่รายงานข้อมูล</p>

        <label>อีเมล</label>
        <input type="email" id="email" placeholder="email@example.com">

        <label>รหัสผ่าน (อย่างน้อย 6 ตัว)</label>
        <input type="password" id="password" placeholder="รหัสผ่าน">

        <label>ยืนยันรหัสผ่าน</label>
        <input type="password" id="password2" placeholder="กรอกรหัสผ่านอีกครั้ง">

        <div class="msg" id="msg"></div>

        <button class="btn btn-submit" id="btn-submit" onclick="doSignup()">สมัครสมาชิก</button>
        <button class="btn btn-back" onclick="location.href='/'">กลับหน้าหลัก</button>
    </div>

    <script>
        const SUPABASE_URL = 'https://tekcyzixbsuankaiuncs.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_7VRgnntgw8VyGVgC8mTLrA_rnaE2vm0';
        const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function doSignup() {
            const email = document.getElementById('email').value.trim();
            const pw = document.getElementById('password').value;
            const pw2 = document.getElementById('password2').value;
            const msg = document.getElementById('msg');
            const btn = document.getElementById('btn-submit');

            msg.className = 'msg';
            msg.style.display = 'none';

            if (!email || !pw) { showMsg('กรุณากรอกอีเมลและรหัสผ่าน', 'error'); return; }
            if (pw.length < 6) { showMsg('รหัสผ่านต้องมีอย่างน้อย 6 ตัวอักษร', 'error'); return; }
            if (pw !== pw2) { showMsg('รหัสผ่านไม่ตรงกัน', 'error'); return; }

            btn.disabled = true;
            btn.textContent = 'กำลังสมัคร...';

            const { data, error } = await sb.auth.signUp({ email, password: pw });

            if (error) {
                showMsg(error.message, 'error');
            } else {
                showMsg('สมัครสำเร็จ! กำลังพาไปหน้าหลัก...', 'success');
                setTimeout(() => location.href = '/', 2000);
            }

            btn.disabled = false;
            btn.textContent = 'สมัครสมาชิก';
        }

        function showMsg(text, type) {
            const msg = document.getElementById('msg');
            msg.textContent = text;
            msg.className = 'msg ' + type;
        }

        // ถ้า login อยู่แล้ว redirect กลับหน้าหลัก
        sb.auth.getSession().then(({ data: { session } }) => {
            if (session) location.href = '/';
        });
    </script>
</body>
</html>
